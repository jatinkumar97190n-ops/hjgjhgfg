        .video-wrapper {

        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;

        }

            top: 0;

            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .meta-item strong {
            color: #cccccc;
        }

        .section-title {
